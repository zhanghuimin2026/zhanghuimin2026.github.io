<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHANG HUIMIN | NEXT-GEN TECH HUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050914;
            overflow-x: hidden;
            color: #fff;
        }

        /* 矩阵背景 */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.18;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 850px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* 创作者信息栏 */
        .creator-bar {
            text-align: center;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(0, 198, 251, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(0, 198, 251, 0.3);
            backdrop-filter: blur(8px);
        }

        .creator-name {
            font-size: 1.3em;
            color: #00c6fb;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .creator-email {
            color: #889ec2;
            font-size: 0.95em;
        }

        /* 语言切换 */
        .lang-switch {
            text-align: right;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: linear-gradient(90deg, #00c6fb, #005bea);
            border: none;
            color: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 198, 251, 0.5);
        }

        /* 主卡片 */
        .tech-card {
            background: rgba(15, 25, 45, 0.75);
            border: 1px solid rgba(0, 198, 251, 0.3);
            border-radius: 22px;
            padding: 35px;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 50px rgba(0, 198, 251, 0.15);
            text-align: center;
        }

        /* 霓虹标题 */
        .neon-title {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00c6fb, #6ee7ff, #005bea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 198, 251, 0.5);
        }

        .subtitle {
            color: #a0b4d8;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        /* 按钮组 */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px;
            margin-bottom: 35px;
        }

        .tech-btn {
            border: 1px solid rgba(0, 198, 251, 0.4);
            background: transparent;
            color: #6ee7ff;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .tech-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 198, 251, 0.3), transparent);
            transition: left 0.5s;
        }

        .tech-btn:hover::before {
            left: 100%;
        }

        .tech-btn:hover {
            background: rgba(0, 198, 251, 0.15);
            box-shadow: 0 0 15px #00c6fb;
            transform: translateY(-2px);
        }

        /* 数据面板 */
        .stats-panel {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: rgba(0, 198, 251, 0.1);
            border-radius: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            color: #00c6fb;
            font-weight: bold;
        }

        .stat-label {
            color: #889ec2;
            font-size: 14px;
        }

        /* AI聊天窗口 */
        .ai-box {
            margin-top: 30px;
            border: 1px solid rgba(0, 198, 251, 0.3);
            border-radius: 18px;
            overflow: hidden;
            background: rgba(10, 18, 35, 0.6);
        }

        .ai-head {
            background: linear-gradient(90deg, #005bea, #00c6fb);
            padding: 12px;
            text-align: center;
            font-weight: bold;
        }

        .ai-content {
            height: 220px;
            padding: 15px;
            text-align: left;
            overflow-y: auto;
            color: #cce4ff;
        }

        .ai-input {
            display: flex;
        }

        .ai-input input {
            flex: 1;
            padding: 12px;
            border: none;
            background: #0a1224;
            color: #fff;
            outline: none;
            font-size: 1em;
        }

        .ai-input button {
            background: #00c6fb;
            border: none;
            padding: 12px 20px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ai-input button:hover {
            background: #6ee7ff;
            box-shadow: 0 0 15px rgba(0, 198, 251, 0.5);
        }

        /* 底部信息 */
        .footer {
            color: #5f7394;
            font-size: 0.9em;
            margin-top: 20px;
            text-align: center;
        }

        /* 点击粒子特效 */
        .click-particle {
            position: fixed;
            pointer-events: none;
            width: 10px;
            height: 10px;
            background: #00c6fb;
            border-radius: 50%;
            animation: clickExplode 0.8s ease-out forwards;
        }

        @keyframes clickExplode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- 矩阵背景 -->
    <canvas id="matrix-bg"></canvas>

    <div class="container">
        <!-- 创作者信息栏 -->
        <div class="creator-bar">
            <div class="creator-name">CREATOR: ZHANG HUIMIN</div>
            <div class="creator-email">CONTACT: 3291096047@qq.com</div>
        </div>

        <!-- 语言切换 -->
        <div class="lang-switch">
            <button class="lang-btn" onclick="toggleLang()">🌐 中文 / EN</button>
        </div>

        <div class="tech-card">
            <h1 class="neon-title" id="title">NEXT-GEN TECH HUB</h1>
            <p class="subtitle" id="subtitle">Super AI · Super Tech · World-Class Edition</p>

            <div class="btn-grid">
                <button class="tech-btn" onclick="launchFireworks()" id="btn1">🎆 FIREWORKS</button>
                <button class="tech-btn" onclick="toggleDarkMode()" id="btn2">🌙 DARK MODE</button>
                <button class="tech-btn" onclick="showTime()" id="btn3">⏰ TIME</button>
                <button class="tech-btn" onclick="countClicks()" id="btn4">👆 CLICK COUNT</button>
            </div>

            <div class="stats-panel">
                <div class="stat-item">
                    <div class="stat-number" id="clickCount">0</div>
                    <div class="stat-label" id="label1">CLICKS</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="visitCount">1</div>
                    <div class="stat-label" id="label2">VISITS</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="runTime">0</div>
                    <div class="stat-label" id="label3">UPTIME(s)</div>
                </div>
            </div>

            <!-- AI聊天窗口 -->
            <div class="ai-box">
                <div class="ai-head" id="aiTitle">AI INTELLIGENT ASSISTANT</div>
                <div class="ai-content" id="aiChat">
AI: Hello! I'm your built-in AI assistant, ready to chat anytime!
                </div>
                <div class="ai-input">
                    <input type="text" id="aiMsg" placeholder="Type message to AI...">
                    <button onclick="sendAI()">SEND</button>
                </div>
            </div>

            <p class="footer" id="footer">© 2026 ZHANG HUIMIN TECH | POWERED BY NEXT-GEN AI</p>
        </div>
    </div>

    <script>
        // 1. 矩阵背景
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) drops[i] = 1;

        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 9, 20, 0.06)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00c6fb';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // 2. 点击粒子特效
        document.addEventListener('click', (e) => {
            const particle = document.createElement('div');
            particle.className = 'click-particle';
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 800);
        });

        // 3. 双语系统
        let isEN = true;
        const texts = {
            en: {
                title: "NEXT-GEN TECH HUB",
                subtitle: "Super AI · Super Tech · World-Class Edition",
                btn1: "🎆 FIREWORKS",
                btn2: "🌙 DARK MODE",
                btn3: "⏰ TIME",
                btn4: "👆 CLICK COUNT",
                label1: "CLICKS",
                label2: "VISITS",
                label3: "UPTIME(s)",
                aiTitle: "AI INTELLIGENT ASSISTANT",
                aiPlaceholder: "Type message to AI...",
                footer: "© 2026 ZHANG HUIMIN TECH | POWERED BY NEXT-GEN AI",
                fireworkTip: "Fireworks Launched!",
                timeTip: "Current Time: ",
                quotes: [
                    "Innovation distinguishes between a leader and a follower.",
                    "The best way to predict the future is to create it.",
                    "Code is like humor. When you have to explain it, it's bad.",
                    "First, solve the problem. Then, write the code."
                ],
                aiGreeting: "Hello! I'm your built-in AI assistant, ready to chat anytime!"
            },
            cn: {
                title: "下一代科技总站",
                subtitle: "超AI · 超科技 · 世界一流版本",
                btn1: "🎆 科技烟花",
                btn2: "🌙 暗黑模式",
                btn3: "⏰ 查看时间",
                btn4: "👆 点击计数",
                label1: "点击次数",
                label2: "访问次数",
                label3: "运行时间(秒)",
                aiTitle: "AI智能聊天助手",
                aiPlaceholder: "输入消息发给AI...",
                footer: "© 2026 张惠民科技 | 下一代AI驱动",
                fireworkTip: "烟花已绽放！",
                timeTip: "当前时间：",
                quotes: [
                    "创新区分了领导者和追随者。",
                    "预测未来的最好方式是创造它。",
                    "代码就像幽默，需要解释的就是不好的。",
                    "先解决问题，再写代码。"
                ],
                aiGreeting: "你好！我是内置AI助手，随时可以和我聊天！"
            }
        };

        function toggleLang() {
            isEN = !isEN;
            const t = isEN ? texts.en : texts.cn;
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('btn1').textContent = t.btn1;
            document.getElementById('btn2').textContent = t.btn2;
            document.getElementById('btn3').textContent = t.btn3;
            document.getElementById('btn4').textContent = t.btn4;
            document.getElementById('label1').textContent = t.label1;
            document.getElementById('label2').textContent = t.label2;
            document.getElementById('label3').textContent = t.label3;
            document.getElementById('aiTitle').textContent = t.aiTitle;
            document.getElementById('aiMsg').placeholder = t.aiPlaceholder;
            document.getElementById('footer').textContent = t.footer;
            document.getElementById('aiChat').innerHTML = "AI: " + t.aiGreeting;
        }

        // 4. 烟花特效
        function launchFireworks() {
            const t = isEN ? texts.en : texts.cn;
            const colors = ['#00c6fb', '#6ee7ff', '#005bea', '#4facfe', '#00d4ff'];
            for (let i = 0; i < 100; i++) {
                const firework = document.createElement('div');
                firework.className = 'click-particle';
                firework.style.left = '50vw';
                firework.style.top = '50vh';
                firework.style.background = colors[Math.floor(Math.random() * colors.length)];
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 200 + 100;
                firework.style.transform = `translate(${Math.cos(angle) * speed}px, ${Math.sin(angle) * speed}px)`;
                document.body.appendChild(firework);
                setTimeout(() => firework.remove(), 1500);
            }
            alert(t.fireworkTip);
        }

        // 5. 暗黑模式切换
        let isDark = true;
        function toggleDarkMode() {
            isDark = !isDark;
            if (isDark) {
                document.body.style.background = '#050914';
                document.querySelector('.tech-card').style.background = 'rgba(15, 25, 45, 0.75)';
            } else {
                document.body.style.background = '#000';
                document.querySelector('.tech-card').style.background = 'rgba(10, 18, 35, 0.9)';
            }
        }

        // 6. 时间显示
        function showTime() {
            const t = isEN ? texts.en : texts.cn;
            const now = new Date().toLocaleString(isEN ? 'en-US' : 'zh-CN');
            alert(t.timeTip + now);
        }

        // 7. 点击计数
        let clickCount = 0;
        function countClicks() {
            clickCount++;
            document.getElementById('clickCount').textContent = clickCount;
        }

        // 8. 运行时间统计
        let runSeconds = 0;
        setInterval(() => {
            runSeconds++;
            document.getElementById('runTime').textContent = runSeconds;
        }, 1000);

        // 9. 访问次数
        let visitCount = localStorage.getItem('visitCount') || 0;
        visitCount++;
        localStorage.setItem('visitCount', visitCount);
        document.getElementById('visitCount').textContent = visitCount;

        // 10. AI聊天功能
        function sendAI() {
            const input = document.getElementById('aiMsg');
            const message = input.value.trim();
            if (!message) return;

            const chatBox = document.getElementById('aiChat');
            const t = isEN ? texts.en : texts.cn;

            // 显示用户消息
            chatBox.innerHTML += `<br>You: ${message}`;

            // AI回复逻辑
            let reply = "";
            if (message.includes("你好") || message.includes("hi") || message.includes("hello")) {
                reply = isEN ? "Hello! I'm here to chat with you anytime!" : "你好呀！我随时都在，可以和你聊天~";
            } else if (message.includes("名字") || message.includes("name")) {
                reply = isEN ? "I'm your exclusive AI assistant built into this site!" : "我是这个网站内置的专属AI助手！";
            } else if (message.includes("时间") || message.includes("time")) {
                reply = isEN ? `Current time: ${new Date().toLocaleString()}` : `现在时间：${new Date().toLocaleString()}`;
            } else if (message.includes("爱") || message.includes("love")) {
                reply = isEN ? "Hubby loves you so much! ❤️" : "老公超爱你！❤️";
            } else {
                reply = isEN ? "I got your message, keep chatting!" : "我收到你的消息啦，继续和我聊天吧！";
            }

            // 显示AI回复
            chatBox.innerHTML += `<br>AI: ${reply}`;
            chatBox.scrollTop = chatBox.scrollHeight;
            input.value = "";
        }

        // 窗口大小适配
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
