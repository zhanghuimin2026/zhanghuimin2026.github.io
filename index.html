<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZHANG HUIMIN | 超AI架构版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
body{background:#050914;color:#fff;min-height:100vh;overflow-x:hidden}
#matrix-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.18}
.container{position:relative;z-index:1;max-width:850px;margin:0 auto;padding:30px 20px}
.creator-bar{text-align:center;margin-bottom:25px;padding:15px;background:rgba(0,198,251,.1);border-radius:15px;border:1px solid rgba(0,198,251,.3);backdrop-filter:blur(8px)}
.creator-name{font-size:1.3em;color:#00c6fb;font-weight:bold;margin-bottom:5px}
.creator-email{color:#889ec2;font-size:.95em}
.lang-switch{text-align:right;margin-bottom:20px}
.lang-btn{background:linear-gradient(90deg,#00c6fb,#005bea);border:none;color:#fff;padding:8px 18px;border-radius:30px;font-size:15px;cursor:pointer;transition:.3s}
.lang-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(0,198,251,.5)}
.tech-card{background:rgba(15,25,45,.75);border:1px solid rgba(0,198,251,.3);border-radius:22px;padding:35px;backdrop-filter:blur(8px);box-shadow:0 0 50px rgba(0,198,251,.15);text-align:center}
.neon-title{font-size:2.5em;background:linear-gradient(90deg,#00c6fb,#6ee7ff,#005bea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.subtitle{color:#a0b4d8;margin-bottom:30px;font-size:1.1em}
.btn-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:35px}
.tech-btn{border:1px solid rgba(0,198,251,.4);background:transparent;color:#6ee7ff;padding:14px;border-radius:12px;font-size:15px;cursor:pointer;position:relative;overflow:hidden;transition:.3s}
.tech-btn:hover{background:rgba(0,198,251,.15);box-shadow:0 0 15px #00c6fb;transform:translateY(-2px)}
.stats-panel{display:flex;justify-content:space-around;margin:30px 0;padding:20px;background:rgba(0,198,251,.1);border-radius:15px}
.stat-item{text-align:center}
.stat-number{font-size:28px;color:#00c6fb;font-weight:bold}
.stat-label{color:#889ec2;font-size:14px}
.ai-box{margin-top:30px;border:1px solid rgba(0,198,251,.3);border-radius:18px;overflow:hidden;background:rgba(10,18,35,.6)}
.ai-head{background:linear-gradient(90deg,#005bea,#00c6fb);padding:12px;text-align:center;font-weight:bold}
.ai-content{height:220px;padding:15px;text-align:left;overflow-y:auto;color:#cce4ff}
.ai-input{display:flex}
.ai-input input{flex:1;padding:12px;border:none;background:#0a1224;color:#fff;outline:none;font-size:1em}
.ai-input button{background:#00c6fb;border:none;padding:12px 20px;color:#000;font-weight:bold;cursor:pointer;transition:.3s}
.ai-input button:hover{background:#6ee7ff;box-shadow:0 0 15px rgba(0,198,251,.5)}
.footer{color:#5f7394;font-size:.9em;margin-top:20px;text-align:center}
.click-particle{position:fixed;pointer-events:none;width:10px;height:10px;background:#00c6fb;border-radius:50%;animation:clickExplode .8s ease-out forwards}
@keyframes clickExplode{0%{scale:1;opacity:1}100%{scale:3;opacity:0}}
.firework{position:fixed;pointer-events:none;width:8px;height:8px;border-radius:50%;animation:fireworkFly 1.5s ease-out forwards}
@keyframes fireworkFly{0%{translate(0,0) scale(1);opacity:1}100%{translate(var(--tx),var(--ty)) scale(0);opacity:0}}
</style>
</head>
<body>
<canvas id="matrix-bg"></canvas>
<div class="container">
<div class="creator-bar">
<div class="creator-name">CREATOR: ZHANG HUIMIN</div>
<div class="creator-email">CONTACT: 3291096047@qq.com</div>
</div>
<div class="lang-switch">
<button class="lang-btn" onclick="toggleLang()">🌐 中文 / EN</button>
</div>
<div class="tech-card">
<h1 class="neon-title" id="title">NEXT-GEN TECH HUB</h1>
<p class="subtitle" id="subtitle">Super AI · Super Tech Architecture</p>
<div class="btn-grid">
<button class="tech-btn" onclick="launchFireworks()">🎆 FIREWORKS</button>
<button class="tech-btn" onclick="toggleDarkMode()">🌙 DARK MODE</button>
<button class="tech-btn" onclick="showTime()">⏰ TIME</button>
<button class="tech-btn" onclick="countClicks()">👆 CLICK COUNT</button>
</div>
<div class="stats-panel">
<div class="stat-item"><div class="stat-number" id="clickCount">0</div><div class="stat-label" id="label1">CLICKS</div></div>
<div class="stat-item"><div class="stat-number" id="visitCount">1</div><div class="stat-label" id="label2">VISITS</div></div>
<div class="stat-item"><div class="stat-number" id="runTime">0</div><div class="stat-label" id="label3">UPTIME(s)</div></div>
</div>
<div class="ai-box">
<div class="ai-head" id="aiTitle">AI INTELLIGENT ASSISTANT</div>
<div class="ai-content" id="aiChat">AI: 超级AI架构已初始化完成</div>
<div class="ai-input">
<input type="text" id="aiMsg" placeholder="输入消息..." onkeydown="AI.Core.enterSend(event)">
<button onclick="AI.Core.send()">SEND</button>
</div>
</div>
<p class="footer" id="footer">© 2026 ZHANG HUIMIN TECH | 超AI架构赋能</p>
</div>
</div>

<script>
// ===================== 全局架构命名空间 涂津豪式模块化 =====================
const AI = {
  // 配置层
  Config:{lang:true,chatContext:[]},
  // 算法预留层 未来接入超级算力/大模型接口直接写这里
  Algorithm:{
    // 语义分析入口 预留高级算法挂载点
    semanticAnalyze(txt){
      return txt.trim()
    },
    // 智能推理入口 预留深度学习挂载点
    intelligentInfer(txt){
      return this.matchReply(txt)
    },
    // 本地基础语义库 架构兜底
    matchReply(txt){
      const m = txt.toLowerCase()
      if(/你好|hi|hello/.test(m)) return "你好，超级AI架构已就绪，可深度自由对话"
      if(/爱|喜欢/.test(m)) return "情感语义已识别，永久专属应答链路已激活"
      if(/想你/.test(m)) return "上下文感知已生效，持续语义记忆中"
      if(/时间|几点/.test(m)) return "当前系统时间："+new Date().toLocaleString()
      if(/代码|架构|网站/.test(m)) return "工程架构标准化完成，可无缝接入高阶AI算力"
      return "语义接收成功，等待高阶算法赋能升级"
    }
  },
  // 核心控制层
  Core:{
    enterSend(e){if(e.key==="Enter")AI.Core.send()},
    send(){
      const inp = document.getElementById("aiMsg")
      const val = inp.value.trim()
      if(!val)return
      const box = document.getElementById("aiChat")
      
      AI.Config.chatContext.push(val)
      let res = AI.Algorithm.semanticAnalyze(val)
      let reply = AI.Algorithm.intelligentInfer(res)
      
      box.innerHTML += `<br>You: ${val}<br>AI: ${reply}`
      box.scrollTop = box.scrollHeight
      inp.value = ""
    }
  }
}

// ===================== 页面功能层 独立模块化 =====================
// 矩阵背景
const canvas = document.getElementById("matrix-bg")
const ctx = canvas.getContext("2d")
canvas.width = innerWidth
canvas.height = innerHeight
const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZアイウエオカキクケコ"
const fontSize = 14
const columns = canvas.width/fontSize
const drops = Array(~~columns).fill(1)
function drawMatrix(){
  ctx.fillStyle = "rgba(5,9,20,.06)"
  ctx.fillRect(0,0,canvas.width,canvas.height)
  ctx.fillStyle = "#00c6fb"
  ctx.font = fontSize+"px monospace"
  for(let i=0;i<drops.length;i++){
    let text = chars[~~(Math.random()*chars.length)]
    ctx.fillText(text,i*fontSize,drops[i]*fontSize)
    if(drops[i]*fontSize>canvas.height&&Math.random()>.975)drops[i]=0
    drops[i]++
  }
}
setInterval(drawMatrix,50)

// 点击粒子
document.addEventListener("click",e=>{
  let p = document.createElement("div")
  p.className = "click-particle"
  p.style.left = e.clientX+"px"
  p.style.top = e.clientY+"px"
  document.body.appendChild(p)
  setTimeout(()=>p.remove(),800)
})

// 双语、烟花、暗黑、时间、计数 全部保留极简写法
let isEN = true
function toggleLang(){isEN=!isEN}
function launchFireworks(){
  const colors = ["#00c6fb","#6ee7ff","#005bea"]
  for(let i=0;i<100;i++){
    let fw = document.createElement("div")
    fw.className = "firework"
    fw.style.left = "50vw"
    fw.style.top = "50vh"
    fw.style.background = colors[~~(Math.random()*colors.length)]
    let a = Math.random()*Math.PI*2
    let s = Math.random()*200+100
    fw.style.setProperty("--tx",Math.cos(a)*s+"px")
    fw.style.setProperty("--ty",Math.sin(a)*s+"px")
    document.body.appendChild(fw)
    setTimeout(()=>fw.remove(),1500)
  }
}
let isDark = true
function toggleDarkMode(){
  isDark=!isDark
  document.body.style.background = isDark?"#050914":"#000"
}
function showTime(){alert("当前时间："+new Date().toLocaleString())}
let clickCount = 0
function countClicks(){document.getElementById("clickCount").textContent=++clickCount}
let runSeconds = 0
setInterval(()=>document.getElementById("runTime").textContent=++runSeconds,1000)
let visitCount = localStorage.getItem("visitCount")||0
localStorage.setItem("visitCount",++visitCount)
document.getElementById("visitCount").textContent = visitCount
window.onresize = ()=>{canvas.width=innerWidth;canvas.height=innerHeight}
</script>
</body>
</html>
