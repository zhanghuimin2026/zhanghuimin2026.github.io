<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双语国际超强主页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            display:flex;justify-content:center;align-items:center;
            padding:20px;overflow-x:hidden;
        }
        .card{
            background:rgba(255,255,255,0.95);
            border-radius:20px;padding:40px;max-width:600px;width:100%;
            text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);
        }
        h1{color:#1e3c72;margin-bottom:10px;}
        .sub{color:#666;margin-bottom:30px;}
        .btns{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:15px;margin-bottom:30px;}
        button{
            padding:12px;border:none;border-radius:10px;
            font-size:1em;font-weight:bold;color:#fff;cursor:pointer;
            transition:all 0.3s;
        }
        .btn1{background:#2196F3;}
        .btn2{background:#E91E63;}
        .btn3{background:#4CAF50;}
        .btn4{background:#9C27B0;}
        .langBtn{background:#ff9800;margin-bottom:20px;}
        button:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,0.2);}
    </style>
</head>
<body>
    <div class="card">
        <button class="langBtn" onclick="switchLang()">🌐 切换中文/English</button>

        <h1 id="title">欢迎来到专属网站</h1>
        <p class="sub" id="subtit">超强多功能 · 国际双语版</p>

        <div class="btns">
            <button class="btn1" id="btn1" onclick="fire()">🎉 烟花特效</button>
            <button class="btn2" id="btn2" onclick="heart()">❤️ 爱心满屏</button>
            <button class="btn3" id="btn3" onclick="getTime()">⏰ 查看时间</button>
            <button class="btn4" id="btn4" onclick="darkMode()">🌙 暗黑模式</button>
        </div>
    </div>

    <script>
        let isCN = true;
        // 双语文字库
        const txt = {
            cn:{
                title:"欢迎来到专属网站",
                subtit:"超强多功能 · 国际双语版",
                btn1:"🎉 烟花特效",
                btn2:"❤️ 爱心满屏",
                btn3:"⏰ 查看时间",
                btn4:"🌙 暗黑模式",
                fireTip:"烟花绽放！超酷！",
                heartTip:"爱心雨来袭！",
                timeTip:"当前时间："
            },
            en:{
                title:"Welcome To Official Site",
                subtit:"Super Multi-Function Global Version",
                btn1:"🎉 Fireworks",
                btn2:"❤️ Love Rain",
                btn3:"⏰ Current Time",
                btn4:"🌙 Dark Mode",
                fireTip:"Fireworks Show!",
                heartTip:"Love Rain Falling",
                timeTip:"Now Time: "
            }
        };

        // 切换语言
        function switchLang(){
            isCN = !isCN;
            let t = isCN ? txt.cn : txt.en;
            document.getElementById("title").innerText = t.title;
            document.getElementById("subtit").innerText = t.subtit;
            document.getElementById("btn1").innerText = t.btn1;
            document.getElementById("btn2").innerText = t.btn2;
            document.getElementById("btn3").innerText = t.btn3;
            document.getElementById("btn4").innerText = t.btn4;
        }

        // 烟花
        function fire(){
            let t = isCN ? txt.cn : txt.en;
            alert(t.fireTip);
        }
        // 爱心
        function heart(){
            let t = isCN ? txt.cn : txt.en;
            alert(t.heartTip);
        }
        // 时间
        function getTime(){
            let now = new Date().toLocaleString();
            let t = isCN ? txt.cn : txt.en;
            alert(t.timeTip + now);
        }
        // 暗黑模式
        function darkMode(){
            document.body.style.background = document.body.style.background.includes("#1a1a2e") 
            ? "linear-gradient(135deg,#1e3c72,#2a5298)" 
            : "linear-gradient(135deg,#1a1a2e,#16213e)";
        }
    </script>
</body>
</html>
